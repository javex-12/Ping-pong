<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PONG 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loading-screen" class="screen">
        <div class="loader-content">
            <h1 class="logo">PRO<span>PONG</span></h1>
            <div class="loader-bar"><div id="loader-fill"></div></div>
            <p id="loading-text">CALIBRATING OPTICS...</p>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="main-nav">
            <h1 class="title">PRO PONG</h1>
            <div class="nav-links">
                <button id="btn-campaign" class="nav-item">CAMPAIGN</button>
                <button id="btn-shop" class="nav-item">EQUIPMENT</button>
                <button id="btn-settings" class="nav-item">SETTINGS</button>
            </div>
        </div>
    </div>

    <div id="campaign-screen" class="screen hidden">
        <div class="glass-header">
            <button class="back-btn" data-target="home-screen">EXIT</button>
            <h2>TOURNAMENT SELECT</h2>
        </div>
        <div id="level-carousel" class="carousel"></div>
        <div id="level-details" class="details-panel">
            <h3 id="lvl-name">...</h3>
            <p id="lvl-desc">...</p>
            <button id="btn-start-level" class="play-btn">START MATCH</button>
        </div>
    </div>

    <div id="shop-screen" class="screen hidden">
        <div class="glass-header">
            <button class="back-btn" data-target="home-screen">EXIT</button>
            <h2>ARMORY</h2>
            <div class="credits"><span id="shop-credits">0</span> CR</div>
        </div>
        <div class="shop-content">
            <div id="shop-list" class="item-grid"></div>
            <div class="item-stats">
                <h3 id="shop-item-name">SELECT GEAR</h3>
                <div class="stat-group">
                    <div class="stat-label">SPEED</div>
                    <div class="stat-track"><div id="stat-speed" class="stat-fill"></div></div>
                </div>
                <div class="stat-group">
                    <div class="stat-label">CONTROL</div>
                    <div class="stat-track"><div id="stat-control" class="stat-fill"></div></div>
                </div>
                <button id="btn-buy-equip" class="action-btn" disabled>SELECT</button>
            </div>
        </div>
    </div>

    <div id="game-ui" class="screen hidden">
        <div class="hud">
            <div class="score-card">
                <span id="score-p">0</span>
                <span class="divider">/</span>
                <span id="score-e">0</span>
            </div>
            <button id="btn-pause">PAUSE</button>
        </div>
    </div>

    <div id="pause-overlay" class="screen hidden">
        <div class="pause-card">
            <h1>PAUSED</h1>
            <button id="btn-resume" class="nav-item">RESUME</button>
            <button class="back-btn" data-target="home-screen" style="position:static">QUIT MATCH</button>
        </div>
    </div>

    <div id="result-screen" class="screen hidden">
        <div class="result-card">
            <h1 id="result-title">MATCH END</h1>
            <div class="reward-box">
                <div>XP <span id="res-xp">+0</span></div>
                <div>CR <span id="res-cr">+0</span></div>
            </div>
            <button id="btn-continue" class="play-btn">CONTINUE</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="js/main.js"></script>
    <script>
        // Force unregister old service workers to break out of cache
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        
        // Auto-reload on first visit to this version if cache is suspected
        if (!localStorage.getItem('pro_v1_loaded')) {
            localStorage.setItem('pro_v1_loaded', 'true');
            setTimeout(() => location.reload(), 100);
        }
    </script>
</body>
</html>
